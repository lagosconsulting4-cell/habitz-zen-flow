<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Abrir no navegador</title>
  <meta name="description" content="Abra no seu navegador para continuar." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --accent: #1f3d2b;
      --accent-soft: #e8f0ea;
      --text: #111111;
      --muted: #6b7280;
      --line: #e5e7eb;
      --bg: #ffffff;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      font-family: "Space Grotesk", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* Seta animada apontando pros 3 pontinhos (canto superior direito) */
    .arrow-hint {
      position: fixed;
      top: 8px;
      right: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      color: var(--accent);
      z-index: 10;
      animation: bounce 1.2s ease-in-out infinite;
      pointer-events: none;
    }
    .arrow-hint .dots { font-size: 26px; line-height: 1; }
    .arrow-hint .lbl { font-size: 11px; font-weight: 600; max-width: 120px; text-align: center; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .card { width: 100%; max-width: 420px; text-align: center; }
    .logo {
      width: 104px; height: 104px;
      margin: 0 auto 20px;
      border-radius: 24px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      background: var(--accent-soft);
      padding: 14px;
    }
    .logo img { max-width: 100%; max-height: 100%; object-fit: contain; }
    h1 { font-size: 26px; font-weight: 700; margin: 0 0 22px; color: var(--accent); }
    .lead { font-size: 17px; font-weight: 600; line-height: 1.4; margin: 0 0 26px; }
    .steps { text-align: left; margin: 0 0 26px; padding: 0; list-style: none; }
    .step { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px; }
    .num {
      flex: none; width: 28px; height: 28px; border-radius: 50%;
      background: var(--accent-soft); color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; font-size: 14px;
    }
    .step-text { font-size: 16px; line-height: 1.4; padding-top: 3px; }
    .step-text b { color: var(--accent); }
    .divider { height: 1px; background: var(--line); margin: 22px 0; }
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 16px; border: none; border-radius: 999px;
      background: var(--accent); color: #fff; font-size: 16px; font-weight: 600;
      font-family: inherit; cursor: pointer; text-decoration: none;
    }
    .copy {
      display: inline-flex; align-items: center; gap: 8px;
      margin-top: 16px; background: none; border: none; color: var(--muted);
      font-size: 15px; font-family: inherit; cursor: pointer;
    }
    .copy.done { color: var(--accent); }
  </style>
  <script async src="https://cdn.utmify.com.br/scripts/utms/latest.js"></script>
</head>

<body>
  <div class="arrow-hint">
    <div class="dots">⋯ ↗</div>
    <div class="lbl">toque aqui</div>
  </div>

  <main class="card">
    <div class="logo" id="logo"></div>
    <h1 id="title">Carregando…</h1>
    <p class="lead">Para acessar, siga estes dois passos:</p>
    <ul class="steps">
      <li class="step">
        <span class="num">1</span>
        <span class="step-text">Toque em <b>⋯ no canto superior direito</b></span>
      </li>
      <li class="step">
        <span class="num">2</span>
        <span class="step-text">Depois em <b>"Abrir no navegador"</b></span>
      </li>
    </ul>
    <div class="divider"></div>
    <a class="btn" id="openBtn" href="#">👆 Ou toque e segure para abrir o link</a>
    <button class="copy" id="copyBtn">🔗 Copiar link</button>
  </main>

  <script>
    (function () {
      // Catálogo por produto: destino + nome + tema (cor) + logo.
      var DEST = {
        foquinha: {
          name: "Foquinha AÍ",
          url: "https://www.foquinhaai.life",
          accent: "#1FAA53", accentSoft: "#e3f5ea",
          logo: "/tiktok/assets/foquinha_logo.png",
        },
        thor: {
          // Thor vai DIRETO pra App Store (decisão do dono).
          name: "Thor — Amigo Financeiro",
          url: "https://apps.apple.com/us/app/thor-finance-pal/id6772835632",
          accent: "#101828", accentSoft: "#e6e9ef",
          logo: "/tiktok/assets/thor_sm.png",
        },
        bora: {
          name: "Bora",
          url: "https://habitz.life/bora",
          accent: "#1f3d2b", accentSoft: "#e8f0ea",
          logo: "/tiktok/assets/bora_logo.png",
        },
      };

      var params = new URLSearchParams(window.location.search);
      var key = params.get("b") || "bora";
      var d = DEST[key] || DEST.bora;

      // tema
      document.documentElement.style.setProperty("--accent", d.accent);
      document.documentElement.style.setProperty("--accent-soft", d.accentSoft);
      document.title = d.name;

      // logo
      var logoEl = document.getElementById("logo");
      var img = document.createElement("img");
      img.src = d.logo; img.alt = d.name;
      img.onerror = function () { logoEl.textContent = d.name.charAt(0); };
      logoEl.appendChild(img);

      // destino com UTMs (App Store ignora utm, mas LP/site usam)
      var dest = new URL(d.url);
      var isStore = dest.hostname.indexOf("apps.apple.com") === 0 || dest.hostname.indexOf("play.google") >= 0;
      if (!isStore) {
        ["utm_source", "utm_medium", "utm_content", "utm_campaign", "utm_term"].forEach(function (p) {
          var val = params.get(p);
          if (val) dest.searchParams.set(p, val);
        });
        var v = params.get("v");
        if (v && !dest.searchParams.get("utm_content")) dest.searchParams.set("utm_content", v);
        if (!dest.searchParams.get("utm_source")) dest.searchParams.set("utm_source", "tiktok");
        if (!dest.searchParams.get("utm_medium")) dest.searchParams.set("utm_medium", "organic");
      }
      var destUrl = dest.href;

      document.getElementById("title").textContent = d.name;
      document.getElementById("openBtn").href = destUrl;

      var copyBtn = document.getElementById("copyBtn");
      copyBtn.addEventListener("click", function () {
        navigator.clipboard.writeText(destUrl).then(function () {
          copyBtn.textContent = "✓ Link copiado";
          copyBtn.classList.add("done");
          setTimeout(function () {
            copyBtn.textContent = "🔗 Copiar link";
            copyBtn.classList.remove("done");
          }, 2000);
        }).catch(function () {});
      });
    })();
  </script>
</body>

</html>
